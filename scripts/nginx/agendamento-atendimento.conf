# Substitua:
# - DOMINIO_FINAL pelo dominio oficial quando liberado.
# - IP_DA_VM pelo IP publico/privado usado antes do dominio.
# - BACKEND_HOST pelo host onde o Node escuta a API, por exemplo o loopback da propria VM.

server {
    listen 80;
    server_name DOMINIO_FINAL IP_DA_VM _;

    root /var/www/agendamento-atendimento/frontend/dist;
    index index.html;
    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header X-XSS-Protection "1; mode=block";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://BACKEND_HOST:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

